schema_version = "1.2"

[task]
name = "repo2run/IBM__terratorch"
description = "Configure IBM/terratorch@16e5af9 so pytest --collect-only succeeds."
keywords = ["repo2run", "python", "build-configuration", "environment-setup"]

[metadata]
source = "repo2run"
upstream_repo = "IBM/terratorch"
base_commit = "16e5af99b4b8ddb830ef1c6c3184916d3a74d107"
paper = "arXiv:2502.13681"
criterion = "ebsr-lenient"

[environment]
build_timeout_sec = 900.0
cpus = 2
memory_mb = 4096
storage_mb = 10240
allow_internet = true

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 1800.0

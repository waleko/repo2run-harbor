schema_version = "1.2"

[task]
name = "repo2run/microsoft__aurora"
description = "Configure microsoft/aurora@8b11659 so pytest --collect-only succeeds."
keywords = ["repo2run", "python", "build-configuration", "environment-setup"]

[metadata]
source = "repo2run"
upstream_repo = "microsoft/aurora"
base_commit = "8b11659b91d06f87c2d22e541dbcd0092baf2157"
paper = "arXiv:2502.13681"
criterion = "ebsr-lenient"

[environment]
build_timeout_sec = 900.0
cpus = 2
memory_mb = 4096
storage_mb = 10240
allow_internet = true

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 1800.0

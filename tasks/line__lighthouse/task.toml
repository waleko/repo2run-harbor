schema_version = "1.2"

[task]
name = "repo2run/line__lighthouse"
description = "Configure line/lighthouse@ba9da72 so pytest --collect-only succeeds."
keywords = ["repo2run", "python", "build-configuration", "environment-setup"]

[metadata]
source = "repo2run"
upstream_repo = "line/lighthouse"
base_commit = "ba9da7228c2221f3c14ce3bbec0aa70bfd12d31c"
paper = "arXiv:2502.13681"
criterion = "ebsr-lenient"

[environment]
build_timeout_sec = 900.0
cpus = 2
memory_mb = 4096
storage_mb = 10240
allow_internet = true

[verifier]

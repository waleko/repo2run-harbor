schema_version = "1.2"

[task]
name = "repo2run/AIR-Bench__AIR-Bench"
description = "Configure AIR-Bench/AIR-Bench@4b27b8a so pytest --collect-only succeeds."
keywords = ["repo2run", "python", "build-configuration", "environment-setup"]

[metadata]
source = "repo2run"
upstream_repo = "AIR-Bench/AIR-Bench"
base_commit = "4b27b8a8f2047a963805fcf6fb9d74be51ec440c"
paper = "arXiv:2502.13681"
criterion = "ebsr-lenient"

[environment]
build_timeout_sec = 900.0
cpus = 2
memory_mb = 4096
storage_mb = 10240
allow_internet = true

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 1800.0

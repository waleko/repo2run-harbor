schema_version = "1.2"

[task]
name = "repo2run/Azure-Samples__rag-postgres-openai-python"
description = "Configure Azure-Samples/rag-postgres-openai-python@61bde71 so pytest --collect-only succeeds."
keywords = ["repo2run", "python", "build-configuration", "environment-setup"]

[metadata]
source = "repo2run"
upstream_repo = "Azure-Samples/rag-postgres-openai-python"
base_commit = "61bde71a40ae76baa1445129a709d972f126f205"

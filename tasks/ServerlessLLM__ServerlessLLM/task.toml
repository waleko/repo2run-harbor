schema_version = "1.2"

[task]
name = "repo2run/ServerlessLLM__ServerlessLLM"
description = "Configure ServerlessLLM/ServerlessLLM@8f1e6b6 so pytest --collect-only succeeds."
keywords = ["repo2run", "python", "build-configuration", "environment-setup"]

[metadata]
source = "repo2run"
upstream_repo = "ServerlessLLM/ServerlessLLM"
base_commit = "8f1e6b696e9bc2bdc6c4ca00752a0e4502746060"
paper = "arXiv:2502.13681"
criterion = "ebsr-lenient"

[environment]
build_timeout_sec = 900.0
cpus = 2
memory_mb = 4096
storage_mb = 10240
allow_internet = true

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 1800.0

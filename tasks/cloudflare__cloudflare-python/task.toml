schema_version = "1.2"

[task]
name = "repo2run/cloudflare__cloudflare-python"
description = "Configure cloudflare/cloudflare-python@2284798 so pytest --collect-only succeeds."
keywords = ["repo2run", "python", "build-configuration", "environment-setup"]

[metadata]
source = "repo2run"
upstream_repo = "cloudflare/cloudflare-python"
base_commit = "22847982359f4a7d0170e69e686049e53714131e"
paper = "arXiv:2502.13681"
criterion = "ebsr-lenient"

[environment]
build_timeout_sec = 900.0
cpus = 2
memory_mb = 4096
storage_mb = 10240
allow_internet = true

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 1800.0
